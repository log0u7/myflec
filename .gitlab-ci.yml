default:
  image: ubuntu:latest

stages:
  - lint

lint:
  stage: lint
  before_script:
    - apt-get update -qq && apt-get install -y -qq bash shellcheck
  script:
    - |
      fail=0
      for f in .bashrc.d/*.bash; do
        bash -n "$f" || { echo "Syntax error: $f"; fail=1; }
      done
      exit "$fail"
    - |
      fail=0
      for f in .bashrc.d/*.bash; do
        shellcheck -s bash -e SC1090,SC1091 "$f" || fail=1
      done
      exit "$fail"

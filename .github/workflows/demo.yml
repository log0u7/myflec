---
name: Generate demo GIF

on:
  workflow_dispatch:
  push:
    paths:
      - assets/demo.tape

permissions:
  contents: write

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - name: Deploy MyFlec to HOME
        run: |
          ln -s "$GITHUB_WORKSPACE/.bashrc.d" "$HOME/.bashrc.d"
          ln -s "$GITHUB_WORKSPACE/.gitconfig" "$HOME/.gitconfig"

      - name: Install mise
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/share/mise/shims" >> "$GITHUB_PATH"

      - name: Install tools
        run: |
          eval "$("$HOME/.local/bin/mise" activate bash)"
          "$HOME/.local/bin/mise" trust --all
          "$HOME/.local/bin/mise" use -g \
            bat ripgrep fd fzf zoxide lazygit gh glab delta \
            atuin direnv tlrc glow yq jq lsd starship

      - name: Install Nerd Font (Hack)
        run: |
          mkdir -p ~/.local/share/fonts
          curl -fsSLo /tmp/Hack.zip \
            https://github.com/ryanoasis/nerd-fonts/releases/latest/download/Hack.zip
          unzip -o /tmp/Hack.zip -d ~/.local/share/fonts
          fc-cache -f
          fc-list | grep -i "hack nerd" || { echo "Hack Nerd Font not found"; exit 1; }

      - name: Install VHS dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ttyd ffmpeg

      - name: Install VHS
        run: |
          go install github.com/charmbracelet/vhs@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Generate demo GIF
        run: |
          eval "$("$HOME/.local/bin/mise" activate bash)"
          mkdir -p assets
          vhs assets/demo.tape
          test -s assets/demo.gif || { echo "demo.gif missing or empty"; exit 1; }

      - name: Commit demo GIF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/demo.gif
          git diff --cached --quiet && { echo "No GIF change"; exit 0; }
          git commit -m "chore: update demo GIF"
          git push origin HEAD:main

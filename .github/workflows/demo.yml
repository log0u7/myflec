---
name: Generate demo GIF

on:
  workflow_dispatch:
  push:
    paths:
      - assets/demo.tape

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mise
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/share/mise/shims" >> "$GITHUB_PATH"

      - name: Install tools
        run: |
          eval "$("$HOME/.local/bin/mise" activate bash)"
          "$HOME/.local/bin/mise" trust --all
          "$HOME/.local/bin/mise" use -g \
            bat ripgrep fd fzf zoxide lazygit gh glab delta \
            atuin direnv tlrc glow yq jq lsd starship

      - name: Install Chrome
        run: |
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub \
            | sudo gpg --dearmor -o /usr/share/keyrings/google-chrome.gpg
          SRC="deb [arch=amd64"
          SRC="$SRC signed-by=/usr/share/keyrings/google-chrome.gpg]"
          SRC="$SRC http://dl.google.com/linux/chrome/deb/ stable main"
          echo "$SRC" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq google-chrome-stable

      - name: Install ttyd and VHS
        run: |
          sudo apt-get install -y -qq ttyd
          go install github.com/charmbracelet/vhs@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Generate demo GIF
        run: |
          eval "$("$HOME/.local/bin/mise" activate bash)"
          mkdir -p assets
          vhs assets/demo.tape

      - name: Commit demo GIF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/demo.gif
          git diff --cached --quiet || git commit -m "chore: update demo GIF"
          git push

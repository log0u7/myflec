name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck and yamllint
        run: sudo apt-get install -y shellcheck yamllint

      - name: Syntax check (bash -n)
        run: |
          fail=0
          for f in .bashrc.d/*.bash; do
            bash -n "$f" || { echo "Syntax error: $f"; fail=1; }
          done
          exit "$fail"

      - name: Shellcheck
        run: |
          fail=0
          for f in .bashrc.d/*.bash; do
            shellcheck -s bash -e SC1090,SC1091 "$f" || fail=1
          done
          exit "$fail"

      - name: Yamllint
        run: |
          yamllint -d '{extends: default, rules: {line-length: disable, document-start: disable, truthy: disable}}' \
            .github/workflows/lint.yml \
            .gitlab-ci.yml

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: actionlint
        uses: rhysd/actionlint@v1

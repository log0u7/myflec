name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install shellcheck and yamllint
        run: sudo apt-get install -y shellcheck yamllint

      - name: Syntax check (bash -n)
        run: |
          fail=0
          for f in .bashrc.d/*.bash .bashrc.d/myflec; do
            bash -n "$f" || { echo "Syntax error: $f"; fail=1; }
          done
          exit "$fail"

      - name: Shellcheck (-x, uses .shellcheckrc)
        run: |
          fail=0
          for f in .bashrc.d/*.bash .bashrc.d/myflec; do
            shellcheck -x -s bash "$f" || fail=1
          done
          exit "$fail"

      - name: Smoke test (loader exits cleanly)
        run: HOME=$PWD bash -c '. .bashrc.d/myflec'

      - name: Smoke test (MYFLEC_DEBUG lists all modules)
        run: |
          count=$(HOME=$PWD MYFLEC_DEBUG=1 bash -c '. .bashrc.d/myflec' 2>&1 \
            | grep -c 'configuration loaded' || true)
          echo "Modules loaded: $count"
          [ "$count" -gt 0 ] || { echo "No modules reported"; exit 1; }

      - name: Yamllint
        run: |
          yamllint -d '{extends: default, rules: {line-length: disable, document-start: disable, truthy: disable}}' \
            .github/workflows/lint.yml \
            .github/workflows/demo.yml \
            .gitlab-ci.yml

      - name: actionlint
        run: |
          # Install actionlint v1.7.12
          # Binary release SHA256 verified via the official checksums file
          version="1.7.12"
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v${version}/actionlint_${version}_linux_amd64.tar.gz" \
            | tar -xz actionlint
          ./actionlint -color .github/workflows/lint.yml .github/workflows/demo.yml
